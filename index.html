<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>リアルタイム音声テキスト化 Web Speech API</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel2: #1f2937;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent2: #22c55e;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56,189,248,0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(34,197,94,0.12), transparent 35%),
        var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(980px, 100%);
    }

    header {
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 40px);
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .card {
      background: rgba(17,24,39,0.88);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      backdrop-filter: blur(14px);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }

    .field {
      grid-column: span 4;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.small {
      grid-column: span 2;
    }

    label {
      font-size: 13px;
      color: var(--muted);
    }

    select, input[type="checkbox"] {
      accent-color: var(--accent);
    }

    select {
      width: 100%;
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 15px;
      outline: none;
    }

    .check {
      min-height: 45px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 12px;
      color: var(--text);
      font-size: 14px;
    }

    .buttons {
      grid-column: span 12;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      color: #06111f;
      background: var(--accent);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    button.secondary {
      background: #e2e8f0;
    }

    button.success {
      background: var(--accent2);
    }

    button.danger {
      background: var(--danger);
      color: white;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin: 12px 0 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #64748b;
      box-shadow: 0 0 0 rgba(56,189,248,0);
    }

    .dot.on {
      background: var(--accent2);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.55); }
      70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    .transcriptBox {
      display: grid;
      gap: 12px;
    }

    .area {
      background: rgba(15,23,42,0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      min-height: 170px;
      line-height: 1.8;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .area.final {
      min-height: 260px;
      font-size: 18px;
    }

    .area.interim {
      color: #bae6fd;
      min-height: 90px;
      font-size: 16px;
      opacity: 0.9;
    }

    .sectionTitle {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      margin: 4px 2px -4px;
    }

    .notice {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .error {
      color: #fecaca;
    }

    @media (max-width: 720px) {
      body {
        padding: 14px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .field, .field.small {
        grid-column: span 1;
      }

      .buttons {
        grid-column: span 1;
      }

      button {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>リアルタイム音声テキスト化</h1>
      <p class="lead">Web Speech APIを使って、マイク音声をリアルタイムに文字起こしします。英語・日本語などを切り替えて使えます。</p>
    </header>

    <section class="card">
      <div class="controls">
        <div class="field">
          <label for="language">認識言語</label>
          <select id="language">
            <option value="en-US">English / US</option>
            <option value="en-GB">English / UK</option>
            <option value="ja-JP" selected>日本語</option>
            <option value="ko-KR">한국어</option>
            <option value="zh-CN">中文 / 简体</option>
            <option value="zh-TW">中文 / 繁體</option>
            <option value="fr-FR">Français</option>
            <option value="de-DE">Deutsch</option>
            <option value="es-ES">Español</option>
            <option value="it-IT">Italiano</option>
          </select>
        </div>

        <div class="field small">
          <label>途中結果</label>
          <label class="check">
            <input id="interimToggle" type="checkbox" checked />
            表示する
          </label>
        </div>

        <div class="field small">
          <label>自動再開</label>
          <label class="check">
            <input id="autoRestartToggle" type="checkbox" checked />
            有効
          </label>
        </div>

        <div class="field small">
          <label>連続認識</label>
          <label class="check">
            <input id="continuousToggle" type="checkbox" checked />
            有効
          </label>
        </div>

        <div class="buttons">
          <button id="startBtn">開始</button>
          <button id="stopBtn" class="danger" disabled>停止</button>
          <button id="copyBtn" class="secondary">コピー</button>
          <button id="downloadBtn" class="success">txt保存</button>
          <button id="clearBtn" class="secondary">クリア</button>
        </div>
      </div>

      <div class="status">
        <span id="dot" class="dot"></span>
        <span id="statusText">待機中</span>
        <span id="supportText"></span>
      </div>

      <div class="transcriptBox">
        <div class="sectionTitle">
          <span>確定テキスト（オリジナル言語）</span>
          <span id="charCount">0文字</span>
        </div>
        <div id="finalText" class="area final" aria-live="polite"></div>

        <div class="sectionTitle">
          <span>日本語翻訳</span>
          <span id="translateStatus">未翻訳</span>
        </div>
        <div id="translatedText" class="area final" aria-live="polite"></div>

        <div class="sectionTitle">
          <span>リアルタイム途中結果</span>
        </div>
        <div id="interimText" class="area interim" aria-live="polite"></div>
      </div>

      <p class="notice">
        ※ Web Speech APIはブラウザ依存です。Chrome / Edge系ブラウザでの利用を推奨します。iPhone Safariでは動作しない場合があります。
        マイク利用にはHTTPS環境、またはlocalhostが必要です。日本語翻訳にはインターネット接続が必要です。
      </p>
    </section>
  </main>

  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    const language = document.getElementById("language");
    const interimToggle = document.getElementById("interimToggle");
    const autoRestartToggle = document.getElementById("autoRestartToggle");
    const continuousToggle = document.getElementById("continuousToggle");

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const copyBtn = document.getElementById("copyBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const clearBtn = document.getElementById("clearBtn");

    const finalText = document.getElementById("finalText");
    const translatedText = document.getElementById("translatedText");
    const translateStatus = document.getElementById("translateStatus");
    const interimText = document.getElementById("interimText");
    const statusText = document.getElementById("statusText");
    const supportText = document.getElementById("supportText");
    const dot = document.getElementById("dot");
    const charCount = document.getElementById("charCount");

    let recognition = null;
    let isListening = false;
    let shouldRestart = false;
    let finalTranscript = "";
    let translateTimer = null;
    let lastTranslatedSource = "";

    function setStatus(message, active = false, isError = false) {
      statusText.textContent = message;
      statusText.className = isError ? "error" : "";
      dot.classList.toggle("on", active);
    }

    function updateFinalText() {
      finalText.textContent = finalTranscript.trim();
      charCount.textContent = `${finalTranscript.trim().length}文字`;
    }

    function getSourceLangForTranslation() {
      const selected = language.value || "auto";
      if (selected.toLowerCase().startsWith("ja")) {
        return "ja";
      }
      return selected.split("-")[0] || "auto";
    }

    function scheduleTranslation() {
      const sourceText = finalTranscript.trim();

      clearTimeout(translateTimer);

      if (!sourceText) {
        translatedText.textContent = "";
        translateStatus.textContent = "未翻訳";
        lastTranslatedSource = "";
        return;
      }

      if (sourceText === lastTranslatedSource) {
        return;
      }

      translateStatus.textContent = "翻訳待機中";

      translateTimer = setTimeout(() => {
        translateFinalText(sourceText);
      }, 700);
    }

    async function translateFinalText(sourceText) {
      if (!sourceText || sourceText === lastTranslatedSource) {
        return;
      }

      translateStatus.textContent = "翻訳中";

      try {
        const sourceLang = getSourceLangForTranslation();
        const url =
          "https://translate.googleapis.com/translate_a/single" +
          "?client=gtx" +
          "&sl=" + encodeURIComponent(sourceLang) +
          "&tl=ja" +
          "&dt=t" +
          "&q=" + encodeURIComponent(sourceText);

        const response = await fetch(url);

        if (!response.ok) {
          throw new Error("translation request failed");
        }

        const data = await response.json();
        const translated = Array.isArray(data?.[0])
          ? data[0].map(part => part?.[0] || "").join("")
          : "";

        translatedText.textContent = translated || "翻訳結果を取得できませんでした。";
        translateStatus.textContent = "翻訳済み";
        lastTranslatedSource = sourceText;
      } catch (error) {
        translateStatus.textContent = "翻訳失敗";
        translatedText.textContent =
          "翻訳に失敗しました。ネットワーク、CORS制限、または翻訳サービス側の制限が原因の可能性があります。";
      }
    }

    function createRecognition() {
      const rec = new SpeechRecognition();

      rec.lang = language.value;
      rec.continuous = continuousToggle.checked;
      rec.interimResults = interimToggle.checked;
      rec.maxAlternatives = 1;

      rec.onstart = () => {
        isListening = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        setStatus("認識中です。話してください。", true);
      };

      rec.onresult = (event) => {
        let interimTranscript = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
          const text = event.results[i][0].transcript;

          if (event.results[i].isFinal) {
            finalTranscript += text + "\n";
          } else {
            interimTranscript += text;
          }
        }

        updateFinalText();
        scheduleTranslation();
        interimText.textContent = interimTranscript;
      };

      rec.onerror = (event) => {
        const messageMap = {
          "no-speech": "音声が検出されませんでした。",
          "audio-capture": "マイクが見つかりません。接続や権限を確認してください。",
          "not-allowed": "マイクの使用が許可されていません。",
          "network": "音声認識サービスとの通信で問題が発生しました。",
          "aborted": "音声認識が中断されました。"
        };

        const message = messageMap[event.error] || `音声認識エラー: ${event.error}`;
        setStatus(message, false, true);
      };

      rec.onend = () => {
        isListening = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        dot.classList.remove("on");

        if (shouldRestart && autoRestartToggle.checked) {
          setStatus("認識が一時停止したため、自動再開します。", false);
          setTimeout(() => {
            if (shouldRestart && !isListening) {
              startRecognition();
            }
          }, 350);
        } else {
          setStatus("停止しました。", false);
        }
      };

      return rec;
    }

    function startRecognition() {
      if (!SpeechRecognition) {
        setStatus("このブラウザはWeb Speech APIに対応していません。ChromeまたはEdgeで試してください。", false, true);
        return;
      }

      if (isListening) return;

      try {
        recognition = createRecognition();
        shouldRestart = true;
        recognition.start();
      } catch (error) {
        setStatus("開始に失敗しました。少し待ってから再度開始してください。", false, true);
      }
    }

    function stopRecognition() {
      shouldRestart = false;
      interimText.textContent = "";

      if (recognition && isListening) {
        recognition.stop();
      } else {
        setStatus("停止しました。", false);
      }
    }

    async function copyTranscript() {
      const text = finalTranscript.trim();

      if (!text) {
        setStatus("コピーするテキストがありません。", false, true);
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        setStatus("テキストをコピーしました。", isListening);
      } catch {
        setStatus("コピーに失敗しました。ブラウザの権限を確認してください。", isListening, true);
      }
    }

    function downloadTranscript() {
      const text = finalTranscript.trim();

      if (!text) {
        setStatus("保存するテキストがありません。", false, true);
        return;
      }

      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const now = new Date();
      const stamp = now.toISOString().replace(/[:.]/g, "-");

      a.href = url;
      a.download = `transcript-${stamp}.txt`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      setStatus("txtファイルとして保存しました。", isListening);
    }

    function clearTranscript() {
      finalTranscript = "";
      interimText.textContent = "";
      translatedText.textContent = "";
      translateStatus.textContent = "未翻訳";
      lastTranslatedSource = "";
      clearTimeout(translateTimer);
      updateFinalText();
      setStatus("テキストをクリアしました。", isListening);
    }

    startBtn.addEventListener("click", startRecognition);
    stopBtn.addEventListener("click", stopRecognition);
    copyBtn.addEventListener("click", copyTranscript);
    downloadBtn.addEventListener("click", downloadTranscript);
    clearBtn.addEventListener("click", clearTranscript);

    language.addEventListener("change", () => {
      if (isListening) {
        stopRecognition();
        setStatus("言語を変更しました。もう一度開始してください。", false);
      }
    });

    if (!SpeechRecognition) {
      supportText.textContent = " / 非対応ブラウザ";
      startBtn.disabled = true;
      setStatus("このブラウザはWeb Speech APIに対応していません。", false, true);
    } else {
      supportText.textContent = " / Web Speech API対応";
    }

    updateFinalText();
  </script>
</body>
</html>
