<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英語リアルタイム音声認識・日本語翻訳</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --line: #e2e8f0;
      --line-strong: #cbd5e1;
      --text: #0f172a;
      --muted: #64748b;
      --muted-light: #94a3b8;
      --interim: #1d4ed8;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #16a34a;
      --shadow: 0 16px 48px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .topArea {
      height: 20vh;
      min-height: 124px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 16px 22px;
      align-items: stretch;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.04);
      z-index: 2;
    }

    .interimPanel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .labelRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.04em;
      font-weight: 600;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      font-weight: 600;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted-light);
    }

    .dot.on {
      background: var(--success);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.34); }
      70% { box-shadow: 0 0 0 8px rgba(22, 163, 74, 0); }
      100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
    }

    .interimText {
      flex: 1;
      width: 100%;
      min-height: 0;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-soft);
      padding: 12px 14px;
      color: var(--interim);
      font-size: clamp(15px, 1.45vw, 22px);
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
      scroll-behavior: smooth;
    }

    .buttonPanel {
      width: 128px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      justify-content: center;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #ffffff;
      background: var(--accent);
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
    }

    button:hover {
      transform: translateY(-1px);
      background: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    button.stop {
      background: var(--danger);
      box-shadow: 0 8px 18px rgba(220, 38, 38, 0.16);
    }

    button.stop:hover {
      background: var(--danger-hover);
    }

    .bottomArea {
      height: 80vh;
      background: var(--bg);
      padding: 16px 22px 22px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .tableShell {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .tableHeader,
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .tableHeader {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 12px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .tableHeader div {
      padding: 11px 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .tableHeader div + div {
      border-left: 1px solid var(--line);
    }

    .tableBody {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      background: var(--surface);
      scroll-behavior: smooth;
    }

    .empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 15px;
      text-align: center;
      padding: 24px;
    }

    .row {
      border-bottom: 1px solid var(--line);
      min-height: 64px;
    }

    .row:nth-child(even) {
      background: #fbfdff;
    }

    .cell {
      padding: 13px 15px 15px;
      line-height: 1.65;
      font-size: clamp(14px, 1.05vw, 17px);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .cell.en {
      color: #111827;
    }

    .cell.jp {
      border-left: 1px solid var(--line);
      color: #334155;
    }

    .cell.pending {
      color: var(--muted-light);
      font-size: clamp(13px, 1vw, 15px);
    }

    .error {
      color: #b91c1c;
    }

    @media (max-width: 760px) {
      .topArea {
        grid-template-columns: 1fr;
        height: 28vh;
        min-height: 200px;
        padding: 12px;
        gap: 10px;
      }

      .buttonPanel {
        width: 100%;
        flex-direction: row;
      }

      .bottomArea {
        height: 72vh;
        padding: 12px;
      }

      .tableHeader,
      .row {
        grid-template-columns: 1fr;
      }

      .tableHeader div + div,
      .cell.jp {
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .cell {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <section class="topArea">
    <div class="interimPanel">
      <div class="labelRow">
        <span>REAL-TIME INTERIM RESULT</span>
        <span class="status">
          <span id="dot" class="dot"></span>
          <span id="statusText">待機中</span>
        </span>
      </div>
      <div id="interimText" class="interimText" aria-live="polite"></div>
    </div>

    <div class="buttonPanel">
      <button id="startBtn">開始</button>
      <button id="stopBtn" class="stop" disabled>停止</button>
    </div>
  </section>

  <section class="bottomArea">
    <div class="tableShell">
      <div class="tableHeader">
        <div>ENGLISH</div>
        <div>日本語</div>
      </div>
      <div id="tableBody" class="tableBody" aria-live="polite">
        <div id="emptyMessage" class="empty">開始ボタンを押して、英語で話してください。</div>
      </div>
    </div>
  </section>

  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const interimText = document.getElementById("interimText");
    const statusText = document.getElementById("statusText");
    const dot = document.getElementById("dot");
    const tableBody = document.getElementById("tableBody");
    const emptyMessage = document.getElementById("emptyMessage");

    const SOURCE_LANG = "en-US";
    const AUTO_RESTART = true;
    const CONTINUOUS = true;
    const SHOW_INTERIM = true;

    let recognition = null;
    let isListening = false;
    let shouldRestart = false;
    let rowId = 0;

    function setStatus(message, active = false, isError = false) {
      statusText.textContent = message;
      statusText.className = isError ? "error" : "";
      dot.classList.toggle("on", active);
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        tableBody.scrollTop = tableBody.scrollHeight;
      });
    }

    function scrollInterimToBottom() {
      requestAnimationFrame(() => {
        interimText.scrollTop = interimText.scrollHeight;
      });
    }

    function createResultRow(englishText) {
      if (emptyMessage) {
        emptyMessage.remove();
      }

      rowId += 1;
      const id = `row-${rowId}`;

      const row = document.createElement("div");
      row.className = "row";
      row.dataset.rowId = id;

      const enCell = document.createElement("div");
      enCell.className = "cell en";
      enCell.textContent = englishText;

      const jpCell = document.createElement("div");
      jpCell.className = "cell jp pending";
      jpCell.textContent = "翻訳中...";

      row.appendChild(enCell);
      row.appendChild(jpCell);
      tableBody.appendChild(row);
      scrollToBottom();

      translateText(englishText, jpCell);

      return row;
    }

    async function translateText(sourceText, targetCell) {
      try {
        const url =
          "https://translate.googleapis.com/translate_a/single" +
          "?client=gtx" +
          "&sl=en" +
          "&tl=ja" +
          "&dt=t" +
          "&q=" + encodeURIComponent(sourceText);

        const response = await fetch(url);

        if (!response.ok) {
          throw new Error("translation request failed");
        }

        const data = await response.json();
        const translated = Array.isArray(data?.[0])
          ? data[0].map(part => part?.[0] || "").join("")
          : "";

        targetCell.textContent = translated || "翻訳結果を取得できませんでした。";
        targetCell.classList.remove("pending");
      } catch (error) {
        targetCell.textContent = "翻訳に失敗しました。";
        targetCell.classList.remove("pending");
        targetCell.classList.add("error");
      } finally {
        scrollToBottom();
      }
    }

    function createRecognition() {
      const rec = new SpeechRecognition();

      rec.lang = SOURCE_LANG;
      rec.continuous = CONTINUOUS;
      rec.interimResults = SHOW_INTERIM;
      rec.maxAlternatives = 1;

      rec.onstart = () => {
        isListening = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        setStatus("認識中", true);
      };

      rec.onresult = (event) => {
        let interimTranscript = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
          const text = event.results[i][0].transcript.trim();

          if (!text) continue;

          if (event.results[i].isFinal) {
            createResultRow(text);
          } else {
            interimTranscript += text + " ";
          }
        }

        interimText.textContent = interimTranscript.trim();
        scrollInterimToBottom();
      };

      rec.onerror = (event) => {
        const messageMap = {
          "no-speech": "音声が検出されませんでした",
          "audio-capture": "マイクが見つかりません",
          "not-allowed": "マイクが許可されていません",
          "network": "通信エラー",
          "aborted": "認識が中断されました"
        };

        setStatus(messageMap[event.error] || `エラー: ${event.error}`, false, true);
      };

      rec.onend = () => {
        isListening = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        dot.classList.remove("on");

        if (shouldRestart && AUTO_RESTART) {
          setStatus("自動再開中", false);
          setTimeout(() => {
            if (shouldRestart && !isListening) {
              startRecognition();
            }
          }, 1000);
        } else {
          setStatus("停止中", false);
        }
      };

      return rec;
    }

    function startRecognition() {
      if (!SpeechRecognition) {
        setStatus("このブラウザはWeb Speech APIに対応していません", false, true);
        return;
      }

      if (isListening) return;

      try {
        recognition = createRecognition();
        shouldRestart = true;
        recognition.start();
      } catch (error) {
        setStatus("開始に失敗しました", false, true);
      }
    }

    function stopRecognition() {
      shouldRestart = false;
      interimText.textContent = "";

      if (recognition && isListening) {
        recognition.stop();
      } else {
        setStatus("停止中", false);
      }
    }

    startBtn.addEventListener("click", startRecognition);
    stopBtn.addEventListener("click", stopRecognition);

    if (!SpeechRecognition) {
      startBtn.disabled = true;
      setStatus("このブラウザはWeb Speech APIに対応していません", false, true);
    }
  </script>
</body>
</html>
